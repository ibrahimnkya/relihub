version: '3.8'

services:
  # Database Service (PostgreSQL 16)
  db:
    image: postgres:16-alpine
    container_name: reli-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reli_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically initialize database schema and core seeds on first boot
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d reli_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Express Backend API Service
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reli-backend
    restart: unless-stopped
    ports:
      - "3060:3060"
    environment:
      DB_USER: dev
      DB_HOST: db
      DB_NAME: reli_db
      DB_PASSWORD: postgres
      DB_PORT: 5432
      PORT: 3060
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  # Frontend Nginx Gateway Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MOCK: "false"
    container_name: reli-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
