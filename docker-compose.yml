services:
  db:
    image: postgres:16-alpine
    container_name: reli-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reli_db}
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-reli_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: reli-backend
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER:-dev}
      DB_HOST: db
      DB_NAME: ${POSTGRES_DB:-reli_db}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_PORT: 5432
      PORT: 3060
      NODE_ENV: production
    ports:
      - "${API_PUBLISH_PORT:-3060}:3060"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3060/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MOCK: "false"
    container_name: reli-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PUBLISH_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
