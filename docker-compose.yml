services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://mafuta.mysafari.co.tz/api}
        VITE_USE_MOCK: "false"
    container_name: reli-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PUBLISH_PORT:-80}:80"
