server {
    listen 80;
    server_name localhost;

    # Gzip Compression for maximum asset loading performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Root files serving configuration
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend health (optional ops/monitoring)
    location /health {
        proxy_pass http://backend:3060/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Reverse proxy gateway routing `/api/` cleanly to the Express backend container
    location /api/ {
        proxy_pass http://backend:3060/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Buffer and timeout settings for robust client-server connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirect server errors to static pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
