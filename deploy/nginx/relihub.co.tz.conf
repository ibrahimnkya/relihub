# ReliHub — static SPA (relihub.co.tz)
# Install: sudo cp deploy/nginx/relihub.co.tz.conf /etc/nginx/sites-available/relihub.co.tz
#          sudo ln -sf /etc/nginx/sites-available/relihub.co.tz /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS (apex)
server {
    listen 80;
    listen [::]:80;
    server_name relihub.co.tz www.relihub.co.tz;
    return 301 https://relihub.co.tz$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name relihub.co.tz www.relihub.co.tz;

    # Certbot (adjust paths if your cert name differs)
    ssl_certificate     /etc/letsencrypt/live/relihub.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relihub.co.tz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → apex
    if ($host = www.relihub.co.tz) {
        return 301 https://relihub.co.tz$request_uri;
    }

    root /var/www/projects/relihub;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets (Vite)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Do not long-cache the shell (new deploys must pick up fresh index.html)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
